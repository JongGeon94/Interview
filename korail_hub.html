<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국철도공사 면접 아카이브 선택</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 80px 20px;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .hub-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            color: #003399; /* 코레일 시그니처 블루 */
        }

        .subtitle {
            color: #475569;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .choice-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 6px solid #cbd5e1;
        }

        /* 📅 2023 ~ 2025 연도별 상단 테두리 포인트 디자인 */
        .choice-card.year-2025 { border-top-color: #003399; }
        .choice-card.year-2024 { border-top-color: #0284c7; }
        .choice-card.year-2023 { border-top-color: #0ea5e9; }

        .choice-card:hover {
            transform: translateY(-8px);
            background: #ffffff;
        }
        .choice-card.year-2025:hover { box-shadow: 0 20px 40px -10px rgba(0, 51, 153, 0.15); }
        .choice-card.year-2024:hover { box-shadow: 0 20px 40px -10px rgba(2, 132, 201, 0.15); }
        .choice-card.year-2023:hover { box-shadow: 0 20px 40px -10px rgba(14, 165, 233, 0.15); }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
            color: #1e293b;
        }

        p {
            font-size: 0.92rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .btn {
            display: block;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #475569;
            transition: all 0.3s ease;
        }

        .choice-card.year-2025:hover .btn { background: #003399; color: #fff; border-color: #003399; }
        .choice-card.year-2024:hover .btn { background: #0284c7; color: #fff; border-color: #0284c7; }
        .choice-card.year-2023:hover .btn { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .back-link:hover { color: #0f172a; }
    </style>
</head>
<body>

<div class="hub-container">
    <header>
        <h1>🚄 한국철도공사 (KOREA RAILROAD)</h1>
        <div class="subtitle">확인하고자 하는 연도별 실전 면접 복기 자료를 선택하세요.</div>
    </header>

    <div class="grid">
        <!-- 2025학년도 복기 링크 -->
        <a href="korail_2025.html" class="choice-card year-2025">
            <div>
                <div class="icon">🕒</div>
                <h2>2025학년도 면접 복기</h2>
                <p>차량 및 전기 직무 기출 질문 데이터 및 최근 면접 평가 경향성 분석</p>
            </div>
            <span class="btn">2025 자료 보기</span>
        </a>

        <!-- 2024학년도 복기 링크 -->
        <a href="korail_2024.html" class="choice-card year-2024">
            <div>
                <div class="icon">📂</div>
                <h2>2024학년도 면접 복기</h2>
                <p>철도 전공 심층 질문 기출 리스트 및 선배들의 상황 대응 가이드 수록</p>
            </div>
            <span class="btn">2024 자료 보기</span>
        </a>

        <!-- 2023학년도 복기 링크 -->
        <a href="korail_2023.html" class="choice-card year-2023">
            <div>
                <div class="icon">📜</div>
                <h2>2023학년도 면접 복기</h2>
                <p>고졸 공채 합격 선배들의 핵심 인성 질문 위주 전통 기출 족보 정리</p>
            </div>
            <span class="btn">2023 자료 보기</span>
        </a>
    </div>

    <a href="index.html" class="back-link">← 메인 대시보드로 돌아가기</a>
</div>

</body>
</html>
